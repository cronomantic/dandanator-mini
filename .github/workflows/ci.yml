name: CI
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test
        # SoundTests require real audio hardware and are skipped in headless CI
        run: mvn --batch-mode verify -Dsurefire.excludes="**/fft/SoundTests.java"
