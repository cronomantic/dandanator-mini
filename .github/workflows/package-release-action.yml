name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # write access is needed to attach the fat JAR to the GitHub Release
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Deploy to GitHub Packages
        # SoundTests require real audio hardware; all other tests run normally.
        # CI (ci.yml) already validated this commit before the tag was created.
        # Skip deploy if this version already exists in GitHub Packages to avoid
        # a 409 Conflict on workflow re-runs (GitHub Packages is immutable).
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          GROUP_PATH=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout | tr '.' '/')
          ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://maven.pkg.github.com/${{ github.repository }}/${GROUP_PATH}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom")
          if [ "$STATUS" = "200" ]; then
            echo "::notice::Version ${VERSION} already published to GitHub Packages — skipping deploy."
          else
            mvn --batch-mode deploy -Dsurefire.excludes="**/fft/SoundTests.java"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload fat JAR artifact for inspection
        uses: actions/upload-artifact@v6
        with:
          name: dandanator-mini-jar
          path: target/dandanator-mini-*.jar
      - name: Attach fat JAR to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # The fat JAR (dandanator-mini-<version>.jar) is built by the deploy step above.
          # It bundles all runtime dependencies and can be run directly with:
          #   java -jar dandanator-mini-<version>.jar          (graphical mode)
          #   java -jar dandanator-mini-<version>.jar --cli …  (command-line mode)
          files: target/dandanator-mini-*.jar

  native-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian/Ubuntu: .deb installer (Debian, Ubuntu, Mint, Pop!_OS, ...)
          - os: ubuntu-latest
            package-type: deb
            artifact-name: dandanator-mini-linux-deb
            install-deps: sudo apt-get update && sudo apt-get install -y fakeroot binutils
          # Fedora/RHEL/openSUSE: .rpm installer
          - os: ubuntu-latest
            package-type: rpm
            artifact-name: dandanator-mini-linux-rpm
            install-deps: sudo apt-get update && sudo apt-get install -y rpm binutils
          # Arch Linux and other distros: app-image packaged as .tar.gz
          - os: ubuntu-latest
            package-type: app-image
            artifact-name: dandanator-mini-linux-app-image
            install-deps: sudo apt-get update && sudo apt-get install -y binutils
          # Windows: .exe installer
          - os: windows-latest
            package-type: exe
            artifact-name: dandanator-mini-windows-exe
          # macOS: .dmg installer
          - os: macos-latest
            package-type: dmg
            artifact-name: dandanator-mini-macos-dmg
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install native packaging dependencies
        if: matrix.install-deps != ''
        run: ${{ matrix.install-deps }}
      - name: Build native package
        shell: bash
        run: mvn --batch-mode verify -DskipTests -Pjpackage -Djpackage.type=${{ matrix.package-type }}
      - name: Create tarball for app-image
        if: matrix.package-type == 'app-image'
        shell: bash
        run: |
          cd target/dist
          tar -czf dandanator-mini-linux-app-image.tar.gz "Dandanator Mini"
          rm -rf "Dandanator Mini"
      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: target/dist/
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # target/dist/ contains exactly one installer file per matrix entry:
          # .deb, .rpm, .tar.gz (app-image), .exe, or .dmg
          files: target/dist/*

